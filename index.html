<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream - Premium Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --background: #141414;
            --primary: #E50914;
            --text: #FFFFFF;
            --text-secondary: #AAAAAA;
            --card-bg: #181818;
            --font-display: 'Bebas Neue', sans-serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            font-family: var(--font-sans);
            overflow-x: hidden;
        }

        /* Navbar Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            transition: background 0.3s;
        }

        header.scrolled {
            background: var(--background);
            border-bottom: 1px solid #222;
        }

        .header-left-block {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .logo {
            color: var(--primary);
            font-family: var(--font-display);
            font-size: 2.5rem;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .nav-btn-saved {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 18px;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn-saved:hover {
            background: #fff;
            color: #000;
        }

        /* Search Input Elements Layout */
        .search-container {
            display: flex;
            align-items: center;
            margin-left: auto;
        }
        
        .search-input {
            background: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 10px 20px;
            border-radius: 24px;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s, background-color 0.3s;
            width: 280px;
            text-align: center;
        }
        
        .search-input:focus {
            border-color: var(--primary);
            background: rgba(0,0,0,0.8);
        }

        /* Auto-Rotating Hero Banner Section */
        .hero-container {
            position: relative;
            height: 85vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 4%;
            background-size: cover;
            background-position: center top;
            transition: background-image 0.8s ease-in-out;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(20,20,20,0.95) 25%, rgba(20,20,20,0.3) 60%, rgba(20,20,20,0) 100%),
                        linear-gradient(to top, rgba(20,20,20,1) 0%, rgba(20,20,20,0) 30%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            width: 100%;
        }

        .hero-logo-box {
            width: auto;
            max-width: 70%;
            height: 140px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(2px 4px 10px rgba(0,0,0,0.7));
            display: block;
            flex-shrink: 0;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: 5.5rem;
            line-height: 0.95;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .hero-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.5;
            font-weight: 300;
            max-width: 600px;
        }

        /* Movie and TV Show Cards Grid Display Layout */
        .main-content {
            padding: 40px 4%;
            position: relative;
            z-index: 5;
            margin-top: -50px;
        }

        .row-title {
            font-family: var(--font-sans);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        @media (max-width: 1000px) {
            .movie-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 700px) {
            .movie-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .movie-grid { grid-template-columns: 1fr; }
        }

        .movie-card {
            background-color: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            aspect-ratio: 16 / 9;
        }

        .movie-card:hover {
            transform: scale(1.06);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .movie-card img.backdrop {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-typography-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: flex-end;
            pointer-events: none;
        }

        .card-custom-logo {
            width: auto;
            max-width: 65%;
            height: 45px;
            object-fit: contain;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.8));
            display: block;
            flex-shrink: 0;
        }

        .card-custom-title {
            font-family: var(--font-display);
            color: var(--text);
            font-size: 1.6rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 80%;
        }

        /* Save Plus Button styling inside tile bottom right */
        .tile-save-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .tile-save-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
        }

        .tile-save-btn.is-saved {
            color: #46d369;
            border-color: #46d369;
            background: rgba(0, 0, 0, 0.85);
        }

        /* Overview Menu Overlay Layout */
        .details-menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0b0b;
            z-index: 1500;
            overflow: hidden;
        }

        .menu-ambient-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .menu-cinematic-dimmer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(15,15,15,1) 0%, rgba(15,15,15,0.7) 40%, rgba(15,15,15,0.1) 100%);
            z-index: 2;
        }

        .menu-content-layer {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100vh;
            padding: 4% 4%;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
        }

        .menu-left-pane {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            text-align: left;
            max-width: 680px;
            width: 100%;
            margin-bottom: 20px;
        }

        .menu-close-btn {
            position: absolute;
            top: 40px;
            right: 4%;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .menu-close-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: rotate(90deg);
        }

        .menu-logo-render {
            width: auto;
            max-width: 90%;
            height: 130px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.9));
            flex-shrink: 0;
        }

        .menu-title-fallback {
            font-family: var(--font-display);
            font-size: 4.5rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            line-height: 1;
            letter-spacing: 1px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }

        .menu-meta-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        .menu-meta-badge {
            border: 1px solid rgba(255,255,255,0.3);
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: #fff;
            background: rgba(0,0,0,0.4);
        }

        .menu-overview-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e4e4e4;
            margin-bottom: 30px;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.9);
        }

        .menu-interactive-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
        }

        .btn-action-primary {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 16px 40px;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.4);
        }

        .btn-action-primary:hover {
            background: #fff;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 255, 255, 0.2);
        }

        .menu-tv-selectors-wrap {
            display: flex;
            gap: 12px;
        }

        .menu-tv-selectors-wrap select {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 14px 20px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-weight: 600;
            outline: none;
            backdrop-filter: blur(10px);
            transition: border-color 0.2s;
        }

        /* Theater Mode Overlay Viewport Layout */
        .theater-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            z-index: 2000;
            flex-direction: column;
            user-select: none;
        }

        .video-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .hover-exit-trigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 2100;
            display: flex;
            justify-content: center;
            pointer-events: auto;
        }

        .pull-down-btn {
            background: rgba(20, 20, 20, 0.95);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: none;
            padding: 12px 35px;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 0 0 14px 14px;
            cursor: pointer;
            transform: translateY(-100%);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hover-exit-trigger:hover .pull-down-btn {
            transform: translateY(0%);
        }

        .pull-down-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <header id="navbar">
        <div class="header-left-block">
            <div class="logo" onclick="resetCatalogGrid()">CineStream</div>
            <button class="nav-btn-saved" onclick="toggleSavedWatchlistOnly()">My List</button>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Search movies or TV series..." onkeyup="if(event.key === 'Enter') executeSearch()">
        </div>
    </header>

    <div id="hero" class="hero-container">
        <div class="hero-overlay"></div>
        <div class="hero-content" id="hero-content-inner">
            <h1 class="hero-title" id="hero-title">Loading Features...</h1>
            <p class="hero-desc" id="hero-desc">Connecting to stream database assets.</p>
        </div>
    </div>

    <main class="main-content">
        <h2 class="row-title" id="search-row-heading" style="display:none;">Search Results</h2>
        <div class="movie-grid" id="search-grid" style="display:none;"></div>

        <h2 class="row-title" id="saved-row-heading" style="display:none;">My Saved Watchlist</h2>
        <div class="movie-grid" id="saved-grid" style="display:none;"></div>

        <h2 class="row-title" id="continue-row-heading" style="display:none;">Continue Watching</h2>
        <div class="movie-grid" id="continue-grid" style="display:none;"></div>

        <h2 class="row-title" id="movies-row-heading">Trending Movies</h2>
        <div class="movie-grid" id="movies-grid"></div>

        <h2 class="row-title" id="tv-row-heading">Popular TV Series</h2>
        <div class="movie-grid" id="tv-grid"></div>
    </main>

    <div id="details-menu" class="details-menu-overlay">
        <div id="menu-bg-fallback" class="menu-ambient-fallback"></div>
        <div class="menu-cinematic-dimmer"></div>
        
        <button class="menu-close-btn" onclick="closeDetailsMenu()">✕</button>

        <div class="menu-content-layer">
            <div class="menu-left-pane">
                <div id="menu-brand-identity-container"></div>
                
                <div class="menu-meta-row">
                    <span class="menu-meta-badge" id="menu-type-badge">Movie</span>
                    <span id="menu-release-year">2026</span>
                    <span style="color: #46d369;">New Release</span>
                </div>

                <p class="menu-overview-text" id="menu-overview-display">Media description file loading.</p>
                
                <div class="menu-interactive-row">
                    <button class="btn-action-primary" onclick="launchActiveStream()">▶ Play Now</button>
                    
                    <div class="menu-tv-selectors-wrap">
                        <select id="menu-dropdown-seasons" style="display: none;"></select>
                        <select id="menu-dropdown-episodes" style="display: none;"></select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="theater-mode" class="theater-overlay">
        <div class="video-container">
            <div class="hover-exit-trigger">
                <button class="pull-down-btn" onclick="exitTheaterMode()">✕ Close Screen & Leave</button>
            </div>
            
            <div id="player-iframe-root"></div>
        </div>
    </div>

    <script>
        const KEY = '3a73619bbb8fc6d47742d1b5b2b707b5'; 
        const TMDB = 'https://api.themoviedb.org/3';
        const IMGB = 'https://image.tmdb.org/t/p/original';
        
        const $ = id => document.getElementById(id);

        let currentMediaItem = null;
        let currentMediaType = null;
        
        let spotlightItems = [];
        let spotlightIndex = 0;
        let spotlightIntervalId = null;

        // Reactive storage engines for lists
        let savedWatchlist = JSON.parse(localStorage.getItem('cs_saved_watchlist')) || [];
        let continueWatching = JSON.parse(localStorage.getItem('cs_continue_history')) || [];
        let viewingSavedOnlyMode = false;

        window.addEventListener('scroll', () => {
            if (window.scrollY > 30) {
                $('navbar').classList.add('scrolled');
            } else {
                $('navbar').classList.remove('scrolled');
            }
        });

        async function initApp() {
            renderListGrids();
            await loadCatalogRows();
            $('menu-dropdown-seasons').addEventListener('change', handleSeasonToggle);
        }

        function renderListGrids() {
            // Render Continue Watching Row Layout
            if (continueWatching.length > 0) {
                $('continue-row-heading').style.display = 'block';
                $('continue-grid').style.display = 'grid';
                renderInterfaceCards(continueWatching, 'continue-grid');
            } else {
                $('continue-row-heading').style.display = 'none';
                $('continue-grid').style.display = 'none';
            }

            // Render Watchlist Data
            if (savedWatchlist.length > 0) {
                renderInterfaceCards(savedWatchlist, 'saved-grid');
                if (viewingSavedOnlyMode) {
                    $('saved-row-heading').style.display = 'block';
                    $('saved-grid').style.display = 'grid';
                }
            } else {
                $('saved-grid').innerHTML = '';
                if (viewingSavedOnlyMode) {
                    $('saved-row-heading').innerText = "Your Saved Watchlist is Empty";
                    $('saved-row-heading').style.display = 'block';
                    $('saved-grid').style.display = 'none';
                }
            }
        }

        async function loadCatalogRows() {
            spotlightItems = [];
            if (spotlightIntervalId) clearInterval(spotlightIntervalId);

            await fetchCatalogData('movie', 'movies-grid');
            await fetchCatalogData('tv', 'tv-grid');
            
            if(spotlightItems.length > 0) {
                updateHeroBanner(spotlightItems[0]);
                spotlightIntervalId = setInterval(rotateSpotlight, 7000); 
            }
        }

        async function executeSearch() {
            const query = $('search-input').value.trim();
            if(!query) {
                resetCatalogGrid();
                return;
            }
            try {
                const res = await fetch(`${TMDB}/search/multi?api_key=${KEY}&query=${encodeURIComponent(query)}&language=en-US`);
                const data = await res.json();
                
                hideAllRows();
                viewingSavedOnlyMode = false;

                $('search-row-heading').style.display = 'block';
                $('search-grid').style.display = 'grid';

                if (data.results && data.results.length > 0) {
                    $('search-row-heading').innerText = `Search Results for "${query}"`;
                    const validItems = data.results.filter(item => item.backdrop_path && (item.media_type === 'movie' || item.media_type === 'tv'));
                    renderInterfaceCards(validItems, 'search-grid');
                } else {
                    $('search-row-heading').innerText = `No results found for "${query}"`;
                    $('search-grid').innerHTML = '';
                }
            } catch (err) {
                console.error("Multi-search catalog parsing failure:", err);
            }
        }

        function hideAllRows() {
            $('movies-row-heading').style.display = 'none';
            $('movies-grid').style.display = 'none';
            $('tv-row-heading').style.display = 'none';
            $('tv-grid').style.display = 'none';
            $('search-row-heading').style.display = 'none';
            $('search-grid').style.display = 'none';
            $('saved-row-heading').style.display = 'none';
            $('saved-grid').style.display = 'none';
            $('continue-row-heading').style.display = 'none';
            $('continue-grid').style.display = 'none';
        }

        function toggleSavedWatchlistOnly() {
            hideAllRows();
            viewingSavedOnlyMode = true;
            $('search-input').value = '';
            
            $('saved-row-heading').innerText = "My Saved Watchlist";
            $('saved-row-heading').style.display = 'block';
            $('saved-grid').style.display = savedWatchlist.length > 0 ? 'grid' : 'none';
            renderListGrids();
        }

        function resetCatalogGrid() {
            viewingSavedOnlyMode = false;
            $('search-input').value = '';
            $('search-row-heading').style.display = 'none';
            $('search-grid').style.display = 'none';
            $('search-grid').innerHTML = '';
            
            $('movies-row-heading').style.display = 'block';
            $('movies-grid').style.display = 'grid';
            $('tv-row-heading').style.display = 'block';
            $('tv-grid').style.display = 'grid';

            renderListGrids();
        }

        async function fetchCatalogData(type, targetLayoutElement) {
            try {
                let url = `${TMDB}/trending/${type}/week?api_key=${KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.results && data.results.length > 0) {
                    spotlightItems = [...spotlightItems, ...data.results.slice(0, 2)];
                    const typedItems = data.results.map(item => ({ ...item, media_type: type }));
                    renderInterfaceCards(typedItems, targetLayoutElement);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderInterfaceCards(items, gridId) {
            const grid = $(gridId);
            grid.innerHTML = '';

            items.forEach(async (item) => {
                if(!item.backdrop_path) return;
                const type = item.media_type || 'movie';
                const nameString = item.title || item.name;
                const isItemSaved = savedWatchlist.some(s => s.id === item.id);

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img class="backdrop" src="${IMGB}${item.backdrop_path}" alt="${nameString}" loading="lazy">
                    <div class="card-typography-overlay" id="logo-container-${gridId}-${item.id}">
                        <div class="card-custom-title">${nameString}</div>
                    </div>
                    <button class="tile-save-btn ${isItemSaved ? 'is-saved' : ''}" id="save-btn-${gridId}-${item.id}">
                        ${isItemSaved ? '✓' : '+'}
                    </button>
                `;

                // Handle click on card wrapper separating trigger mechanics
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('tile-save-btn')) {
                        e.stopPropagation();
                        toggleSaveItem(item);
                        return;
                    }
                    openDetailsMenu(item, type);
                });

                grid.appendChild(card);

                try {
                    const imgRes = await fetch(`${TMDB}/${type}/${item.id}/images?api_key=${KEY}`);
                    const imgData = await imgRes.json();
                    const logoFile = imgData.logos ? imgData.logos.find(l => l.iso_639_1 === 'en') : null;
                    if (logoFile && logoFile.file_path) {
                        const targetBox = $(`logo-container-${gridId}-${item.id}`);
                        if (targetBox) {
                            targetBox.innerHTML = `<img class="card-custom-logo" src="${IMGB}${logoFile.file_path}" alt="${nameString}">`;
                        }
                    }
                } catch(e) {}
            });
        }

        function toggleSaveItem(item) {
            const idx = savedWatchlist.findIndex(s => s.id === item.id);
            if (idx > -1) {
                savedWatchlist.splice(idx, 1);
            } else {
                savedWatchlist.unshift(item);
            }
            localStorage.setItem('cs_saved_watchlist', JSON.stringify(savedWatchlist));
            
            // Re-render UI segments globally to update state indicators
            renderListGrids();
            if(!viewingSavedOnlyMode && !$('search-input').value.trim()) {
                loadCatalogRows();
            } else if ($('search-input').value.trim()) {
                executeSearch();
            }
        }

        function rotateSpotlight() {
            if(spotlightItems.length === 0) return;
            spotlightIndex = (spotlightIndex + 1) % spotlightItems.length;
            updateHeroBanner(spotlightItems[spotlightIndex]);
        }

        async function updateHeroBanner(item) {
            if(!item || !item.backdrop_path) return;
            $('hero').style.backgroundImage = `url('${IMGB}${item.backdrop_path}')`;
            
            const nameString = item.title || item.name;
            const contentBox = $('hero-content-inner');
            
            contentBox.innerHTML = `
                <div id="hero-brand-target">
                     <h1 class="hero-title">${nameString}</h1>
                </div>
                <p class="hero-desc">${item.overview ? item.overview.substring(0, 180) + '...' : ""}</p>
            `;

            try {
                let inferredType = item.title ? 'movie' : 'tv';
                const imgRes = await fetch(`${TMDB}/${inferredType}/${item.id}/images?api_key=${KEY}`);
                const imgData = await imgRes.json();
                const logoFile = imgData.logos ? imgData.logos.find(l => l.iso_639_1 === 'en') : null;
                if (logoFile && logoFile.file_path) {
                    const target = $('hero-brand-target');
                    if(target) {
                        target.innerHTML = `<img class="hero-logo-box" src="${IMGB}${logoFile.file_path}" alt="${nameString}">`;
                    }
                }
            } catch(e){}
        }

        async function openDetailsMenu(item, type) {
            currentMediaItem = item;
            currentMediaType = type;
            const nameString = item.title || item.name;
            const releaseDate = item.release_date || item.first_air_date || '2026';
            const extractionYear = releaseDate.split('-')[0];

            $('menu-bg-fallback').style.backgroundImage = `url('${IMGB}${item.backdrop_path}')`;
            $('menu-overview-display').innerText = item.overview || "No overview mapped.";
            $('menu-brand-identity-container').innerHTML = `<h1 class="menu-title-fallback">${nameString}</h1>`;
            
            $('menu-type-badge').innerText = type === 'movie' ? 'Movie' : 'Series';
            $('menu-release-year').innerText = extractionYear;

            $('menu-dropdown-seasons').style.display = 'none';
            $('menu-dropdown-episodes').style.display = 'none';

            $('details-menu').style.display = 'block';

            try {
                const imgRes = await fetch(`${TMDB}/${type}/${item.id}/images?api_key=${KEY}`);
                const imgData = await imgRes.json();
                const logoFile = imgData.logos ? imgData.logos.find(l => l.iso_639_1 === 'en') : null;
                if(logoFile && logoFile.file_path) {
                    $('menu-brand-identity-container').innerHTML = `<img class="menu-logo-render" src="${IMGB}${logoFile.file_path}" alt="${nameString}">`;
                }
            } catch(e){}

            if(type === 'tv') {
                try {
                    const tvRes = await fetch(`${TMDB}/tv/${item.id}?api_key=${KEY}&language=en-US`);
                    const detailData = await tvRes.json();
                    mapSeasonOptions(detailData.seasons);
                } catch(e) {
                    mapSeasonOptions([{ season_number: 1, episode_count: 10 }]);
                }
            }
        }

        function closeDetailsMenu() {
            $('details-menu').style.display = 'none';
        }

        function mapSeasonOptions(seasons) {
            const seasonSelect = $('menu-dropdown-seasons');
            seasonSelect.innerHTML = '';
            const activeShowSeasons = seasons.filter(s => s.season_number > 0);
            
            activeShowSeasons.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.season_number;
                opt.innerText = `Season ${s.season_number}`;
                opt.dataset.epCount = s.episode_count; 
                seasonSelect.appendChild(opt);
            });

            seasonSelect.style.display = 'inline-block';
            handleSeasonToggle();
        }

        function handleSeasonToggle() {
            const seasonSelect = $('menu-dropdown-seasons');
            const epSelect = $('menu-dropdown-episodes');
            epSelect.innerHTML = '';

            const selectedOption = seasonSelect.options[seasonSelect.selectedIndex];
            const epCount = selectedOption ? parseInt(selectedOption.dataset.epCount) || 10 : 10;

            for(let i = 1; i <= epCount; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.innerText = `Episode ${i}`;
                epSelect.appendChild(opt);
            }
            epSelect.style.display = 'inline-block';
        }

        function launchActiveStream() {
            if(!currentMediaItem) return;
            
            // Append item into Continue Watching memory registry pipeline
            const historyIdx = continueWatching.findIndex(h => h.id === currentMediaItem.id);
            if (historyIdx > -1) {
                continueWatching.splice(historyIdx, 1);
            }
            continueWatching.unshift(currentMediaItem);
            localStorage.setItem('cs_continue_history', JSON.stringify(continueWatching));

            document.body.style.overflow = 'hidden';
            $('theater-mode').style.display = 'flex';

            const root = $('player-iframe-root');

            if(currentMediaType === 'movie') {
                root.innerHTML = `<iframe src="https://www.vidking.net/embed/movie/${currentMediaItem.id}" allowfullscreen></iframe>`;
            } else {
                const seasonNum = $('menu-dropdown-seasons').value || 1;
                const episodeNum = $('menu-dropdown-episodes').value || 1;
                root.innerHTML = `<iframe src="https://www.vidking.net/embed/tv/${currentMediaItem.id}/${seasonNum}/${episodeNum}" allowfullscreen></iframe>`;
            }
        }

        function exitTheaterMode() {
            $('player-iframe-root').innerHTML = "";
            $('theater-mode').style.display = 'none';
            $('details-menu').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
            
            // Dynamic refresh grid rows to display continue tracking item immediate
            if(viewingSavedOnlyMode) {
                toggleSavedWatchlistOnly();
            } else {
                resetCatalogGrid();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
