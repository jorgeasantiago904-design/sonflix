<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexStream - Movies & TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-secondary: #8B949E;
            --accent-color: #38bdf8;
            --modal-bg: rgba(0, 0, 0, 0.9);
            --sidebar-width: 240px;
            --sidebar-bg: #111420;
            --border-color: rgba(255, 255, 255, 0.06);
            --vip-gold: #D4AF37;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 50px;
            transition: padding-left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow-x: hidden;
        }

        /* Responsive Shift for Desktop Views */
        @media (min-width: 1024px) {
            body {
                padding-left: var(--sidebar-width);
            }
            .sidebar {
                transform: translateX(0) !important;
            }
            .hamburger-btn, .sidebar-overlay {
                display: none !important;
            }
        }

        /* --- SIDEBAR STYLES --- */
        .sidebar {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: var(--sidebar-width); 
            height: 100vh;
            background-color: var(--sidebar-bg); 
            border-right: 1px solid var(--border-color);
            z-index: 2000; 
            transform: translateX(-100%); 
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex; 
            flex-direction: column; 
            padding: 2rem 0; 
            box-sizing: border-box;
        }

        .sidebar-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-color: rgba(0,0,0,0.4); 
            z-index: 1999; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.4s ease;
        }

        body.sidebar-open .sidebar { transform: translateX(0); }
        body.sidebar-open .sidebar-overlay { opacity: 1; pointer-events: auto; }
        body.sidebar-open { overflow: hidden; }

        .sidebar-nav, .sidebar-footer { list-style: none; padding: 0 1.2rem; margin: 0; }
        .sidebar-nav { flex-grow: 1; overflow-y: auto; } 
        .nav-separator { margin: 0.75rem 0; border-top: 1px solid var(--border-color); opacity: 0.3; }

        .sidebar-link {
            display: flex; 
            align-items: center; 
            gap: 1rem; 
            padding: 0.75rem 1rem; 
            color: var(--text-secondary);
            text-decoration: none; 
            font-weight: 500; 
            border-radius: 6px; 
            transition: all 0.2s ease; 
            margin-bottom: 0.25rem;
            font-size: 0.95rem;
        }
        .sidebar-link:hover { background-color: rgba(255,255,255,0.04); color: var(--text-color); }
        .sidebar-link.active { color: #0f172a; background-color: var(--accent-color); font-weight: 600; }
        .sidebar-link i { font-size: 1.1rem; width: 24px; text-align: center; }
        .sidebar-link.special-link:hover { color: var(--accent-color); }
        .sidebar-link.vip-buy-link { color: var(--vip-gold); font-weight: 600; }

        /* Hamburger Control Trigger */
        .hamburger-btn {
            background: none; border: none; cursor: pointer; padding: 0; width: 24px; height: 24px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; z-index: 2001; position: relative;
        }
        .hamburger-btn span {
            display: block; width: 100%; height: 2px; background-color: var(--text-color);
            border-radius: 2px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); transform-origin: center;
        }

        body.sidebar-open .hamburger-btn { gap: 0; }
        body.sidebar-open .hamburger-btn span:nth-child(1) { transform: translateY(1px) rotate(45deg); }
        body.sidebar-open .hamburger-btn span:nth-child(2) { opacity: 0; transform: scale(0); }
        body.sidebar-open .hamburger-btn span:nth-child(3) { transform: translateY(-1px) rotate(-45deg); }

        /* --- HEADER --- */
        header {
            background-color: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        header h1 {
            color: var(--accent-color);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .search-container input {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: none;
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 250px;
            outline: none;
        }

        /* --- HERO BANNER LAYOUT --- */
        .hero-banner {
            width: 100%;
            height: 70vh;
            min-height: 400px;
            position: relative;
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(15, 23, 42, 0.95) 30%, rgba(15, 23, 42, 0.4) 70%, transparent 100%),
                        linear-gradient(to top, rgba(15, 23, 42, 1) 0%, transparent 40%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 650px;
            padding: 0 3rem;
        }

        .hero-logo-img {
            max-width: 85%;
            height: auto;
            max-height: 110px;
            margin-bottom: 1.25rem;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.5));
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.1;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .hero-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            font-size: 1rem;
            color: var(--accent-color);
            font-weight: 600;
        }

        .hero-overview {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 5px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s;
        }

        .hero-btn:hover {
            transform: scale(1.05);
        }

        /* --- CONTENT CONTAINERS --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .movie-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s;
            position: relative;
            aspect-ratio: 2 / 3;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 10px rgba(0, 0, 0, 0.5);
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Hover Overlay System */
        .movie-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.98) 45%);
            padding: 2rem 0.5rem 0.5rem 0.5rem;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-sizing: border-box;
        }

        .movie-card:hover .movie-info {
            transform: translateY(0);
        }

        /* Tiny safety layout parameters for text rendering */
        .movie-title {
            font-size: 0.6rem;
            font-weight: 600;
            line-height: 1.2;
            color: #fff;
            word-wrap: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
            padding: 0;
            height: auto;
        }

        /* Sized way down custom text PNG logos on hover to prevent cutoffs */
        .card-title-logo {
            max-width: 100%;
            max-height: 12px; 
            object-fit: contain;
            object-position: left bottom;
            display: block;
            margin-bottom: 3px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.8));
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: var(--accent-color);
            margin-top: 0.15rem;
            padding: 0;
        }

        /* Modal Elements */
        .player-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-bg);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-content {
            width: 90%;
            max-width: 900px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            margin-top: 3rem;
        }

        .load-more-btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0.75rem 2rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .load-more-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-nav">
            <li><a href="#" class="sidebar-link active" data-view="home"><i class="fas fa-home"></i> <span>Home</span></a></li>
            <li><a href="#" class="sidebar-link" data-view="movies"><i class="fas fa-film"></i> <span>Movies</span></a></li>
            <li><a href="#" class="sidebar-link" data-view="tv-shows"><i class="fas fa-tv"></i> <span>TV Shows</span></a></li>
            <li><a href="#" class="sidebar-link" data-view="upcoming"><i class="fas fa-calendar-alt"></i> <span>Upcoming</span></a></li>
            
            <div class="nav-separator"></div>
            
            <li><a href="#" class="sidebar-link" data-view="my-watchlist"><i class="fas fa-bookmark"></i> <span>Watchlist</span></a></li>
            <li><a href="#" class="sidebar-link special-link" data-view="partners"><i class="fas fa-handshake"></i> <span>Partners</span></a></li>
            <li><a href="#" class="sidebar-link vip-buy-link" data-view="buy-vip"><i class="fas fa-crown"></i> <span>Upgrade VIP</span></a></li>
        </ul>
        
        <ul class="sidebar-footer">
            <li><a href="#" class="sidebar-link" data-view="settings"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
        </ul>
    </aside>

    <header>
        <div class="header-brand">
            <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle Navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <h1 id="brand-logo">FlexStream</h1>
        </div>
        <div class="search-container">
            <input type="text" id="search-bar" placeholder="Search items...">
        </div>
    </header>

    <div id="hero-banner-container"></div>

    <div class="container">
        <h2 id="section-title" style="margin-bottom: 1.5rem; margin-top: 1.5rem;">Trending Now</h2>
        <div class="movie-grid" id="movie-grid"></div>
        
        <div class="pagination-container" id="pagination-wrapper">
            <button class="load-more-btn" id="load-more">Load More</button>
        </div>
    </div>

    <div class="player-modal" id="player-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <div class="iframe-container">
                <iframe id="video-player" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';
        const baseURL = 'https://api.themoviedb.org/3';
        const imageBaseURL = 'https://image.tmdb.org/t/p/original';
        const globalCache = {};
        
        let currentGridPage = 1;
        let currentView = 'home';
        let isSearching = false;

        // DOM Elements
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const sidebarLinks = document.querySelectorAll('.sidebar-link');
        const movieGrid = document.getElementById('movie-grid');
        const loadMoreBtn = document.getElementById('load-more');
        const paginationWrapper = document.getElementById('pagination-wrapper');
        const searchBar = document.getElementById('search-bar');
        const sectionTitle = document.getElementById('section-title');
        const brandLogo = document.getElementById('brand-logo');
        const playerModal = document.getElementById('player-modal');
        const videoPlayer = document.getElementById('video-player');
        const closeModal = document.getElementById('close-modal');
        const heroContainer = document.getElementById('hero-banner-container');

        // Sidebar Actions
        function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }
        function closeSidebar() { document.body.classList.remove('sidebar-open'); }

        if (hamburgerBtn) hamburgerBtn.addEventListener('click', toggleSidebar);
        if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);

        sidebarLinks.forEach(link => {
            link.addEventListener('click', (event) => {
                event.preventDefault();
                sidebarLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                const viewTarget = link.getAttribute('data-view');
                switchView(viewTarget);
                closeSidebar();
            });
        });

        function switchView(target) {
            currentGridPage = 1;
            searchBar.value = '';
            isSearching = false;
            heroContainer.innerHTML = '';
            paginationWrapper.style.display = 'flex';

            if (target === 'home') {
                currentView = 'home';
                sectionTitle.textContent = 'Trending Now';
                searchBar.placeholder = 'Search items...';
                paginationWrapper.style.display = 'none';
                loadHomePage();
            } else if (target === 'movies') {
                currentView = 'movies';
                sectionTitle.textContent = 'Popular Movies';
                searchBar.placeholder = 'Search movies...';
                loadPageData(false);
            } else if (target === 'tv-shows') {
                currentView = 'tv-shows';
                sectionTitle.textContent = 'Popular TV Shows';
                searchBar.placeholder = 'Search TV shows...';
                loadPageData(false);
            } else {
                movieGrid.innerHTML = '';
                sectionTitle.textContent = `${target.toUpperCase()} page coming soon!`;
                paginationWrapper.style.display = 'none';
            }
        }

        async function fetchTMDBData(endpoint) {
            const url = `${baseURL}${endpoint}${endpoint.includes('?') ? '&' : '?'}api_key=${API_KEY}`;
            if (globalCache[url]) return globalCache[url];
            try {
                const response = await fetch(url);
                const data = await response.json();
                globalCache[url] = data.results || data;
                return data.results || data;
            } catch (error) {
                console.error("API Failure Context:", error);
                return [];
            }
        }

        // Asynchronous Title Tag Processor - pulls real brand logo image path from TMDB images API
        async function fetchAndApplyLogo(id, type, targetContainerId, fallbackTitle, isHero = false) {
            try {
                const res = await fetch(`${baseURL}/${type}/${id}/images?api_key=${API_KEY}`);
                const data = await res.json();
                const logoFile = data.logos ? data.logos.find(l => l.iso_639_1 === 'en') : null;
                
                const container = document.getElementById(targetContainerId);
                if (container && logoFile && logoFile.file_path) {
                    if (isHero) {
                        container.innerHTML = `<img src="${imageBaseURL}${logoFile.file_path}" alt="${fallbackTitle}" class="hero-logo-img">`;
                    } else {
                        container.innerHTML = `<img src="${imageBaseURL}${logoFile.file_path}" alt="${fallbackTitle}" class="card-title-logo">`;
                    }
                }
            } catch (err) {
                console.error("Failed to load title asset logo tag:", err);
            }
        }

        async function loadHomePage() {
            movieGrid.innerHTML = '';
            const trending = await fetchTMDBData(`/trending/all/week`);
            if (!trending || trending.length === 0) return;

            // Pick a completely random item from the trending list each time you enter/refresh home
            const randomIndex = Math.floor(Math.random() * trending.length);
            const heroItem = trending[randomIndex];

            renderHeroBanner(heroItem);
            
            // Render lower carousel tiles minus the hero element
            const lowerItems = trending.filter(item => item.id !== heroItem.id);
            displayItems(lowerItems.slice(0, 12), false);
        }

        function renderHeroBanner(item) {
            const mediaType = item.media_type || 'movie';
            const releaseDate = item.release_date || item.first_air_date;
            const year = releaseDate ? releaseDate.substring(0, 4) : '';
            const rating = item.vote_average ? `⭐ ${item.vote_average.toFixed(1)}` : '';
            const backdrop = `https://image.tmdb.org/t/p/original${item.backdrop_path}`;
            const nameString = item.title || item.name;
            const targetId = `hero-title-container-${item.id}`;

            heroContainer.innerHTML = `
                <div class="hero-banner" style="background-image: url('${backdrop}');">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <div id="${targetId}">
                            <h2 class="hero-title">${nameString}</h2>
                        </div>
                        <div class="hero-meta">
                            <span>${year}</span>
                            <span>${rating}</span>
                            <span style="text-transform: uppercase;">${mediaType}</span>
                        </div>
                        <p class="hero-overview">${item.overview}</p>
                        <button class="hero-btn" onclick="openPlayer('${item.id}', '${mediaType}')">
                            <i class="fas fa-play"></i> Watch Now
                        </button>
                    </div>
                </div>
            `;

            // Asynchronously fetch and replace text header with official image tag logo if it exists
            fetchAndApplyLogo(item.id, mediaType, targetId, nameString, true);
        }

        async function loadPageData(append = false) {
            const query = searchBar.value.trim();
            isSearching = !!query;
            let data = [];

            if (isSearching) {
                heroContainer.innerHTML = '';
                paginationWrapper.style.display = 'flex';
                const searchType = currentView === 'tv-shows' ? 'tv' : 'movie';
                data = await fetchTMDBData(`/search/${searchType}?query=${encodeURIComponent(query)}&page=${currentGridPage}`);
            } else {
                data = await fetchTMDBData(`/${currentView === 'tv-shows' ? 'tv' : 'movie'}/popular?page=${currentGridPage}`);
            }
            displayItems(data, append);
        }

        function displayItems(items, append = false) {
            if (!append) movieGrid.innerHTML = '';

            items.forEach(item => {
                if (!item.poster_path) return;

                const releaseDate = item.release_date || item.first_air_date;
                const year = releaseDate ? releaseDate.substring(0, 4) : 'N/A';
                const type = item.media_type || (currentView === 'tv-shows' ? 'tv' : 'movie');
                const nameString = item.title || item.name;
                const targetId = `card-title-container-${item.id}-${Math.random().toString(36).substr(2, 5)}`;

                const card = document.createElement('div');
                card.classList.add('movie-card');
                card.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}" alt="${nameString}">
                    <div class="movie-info">
                        <div id="${targetId}" class="movie-title">
                            ${nameString}
                        </div>
                        <div class="movie-meta">
                            <span>${year}</span>
                            <span>⭐ ${item.vote_average.toFixed(1)}</span>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => openPlayer(item.id, type));
                movieGrid.appendChild(card);

                // Asynchronously fetch and replace typography text with official title tag image layout
                fetchAndApplyLogo(item.id, type, targetId, nameString, false);
            });
        }

        function openPlayer(id, type = 'movie') {
            if (type === 'movie') {
                videoPlayer.src = `https://www.vidking.net/embed/movie/${id}`;
            } else {
                videoPlayer.src = `https://www.vidking.net/embed/tv/${id}/1/1`;
            }
            playerModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePlayerModal() {
            playerModal.style.display = 'none';
            videoPlayer.src = '';
            document.body.style.overflow = 'auto';
        }

        // --- LISTENERS ---
        loadMoreBtn.addEventListener('click', () => {
            currentGridPage++;
            loadPageData(true);
        });

        let searchTimeout;
        searchBar.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentGridPage = 1;
                const query = e.target.value.trim();
                
                if (query) {
                    sectionTitle.textContent = `Search Results for "${query}"`;
                    loadPageData(false);
                } else {
                    switchView(currentView);
                }
            }, 500);
        });

        brandLogo.addEventListener('click', () => {
            switchView('home');
            sidebarLinks.forEach(l => l.classList.remove('active'));
            document.querySelector('[data-view="home"]').classList.add('active');
        });

        closeModal.addEventListener('click', closePlayerModal);
        playerModal.addEventListener('click', (e) => {
            if (e.target === playerModal) closePlayerModal();
        });

        switchView('home');
    </script>
</body>
</html>
